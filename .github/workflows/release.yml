# Opt-in npm release. Push a tag like `v0.1.0` to publish.
# Requires an `NPM_TOKEN` repository secret (Automation token from npmjs.com).
# `npm publish` runs `prepublishOnly` (build + test) first; provenance attaches
# a verifiable link between the published tarball and this workflow run.
name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - run: npm ci

      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
